name = "sing-sub"
main = "worker/index.ts"
compatibility_date = "2026-07-15"
workers_dev = false

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "WORKSPACE_BUCKET"
bucket_name = "sing-sub-data"

[[rules]]
type = "Text"
globs = ["**/*.yml"]
fallthrough = true
